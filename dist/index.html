<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrier</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        background: #f0f2f5;
        color: #1c1e21;
        font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      main {
        width: min(480px, 100%);
        text-align: center;
      }
      .mark {
        width: 44px;
        height: 44px;
        margin: 0 auto 18px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: #0866ff;
        color: #fff;
      }
      .mark svg {
        width: 24px;
        height: 24px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        line-height: 1.2;
        font-weight: 650;
      }
      p {
        margin: 0 auto;
        max-width: 420px;
        color: #65676b;
      }
      .actions {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 22px;
      }
      button {
        min-width: 96px;
        min-height: 38px;
        border: 0;
        border-radius: 8px;
        padding: 8px 14px;
        background: #0866ff;
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        cursor: default;
        opacity: .58;
      }
      #detail {
        display: none;
        max-width: 100%;
        margin: 18px auto 0;
        padding: 10px 12px;
        border-radius: 8px;
        background: rgba(0, 0, 0, .05);
        color: #65676b;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
        text-align: left;
        font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      body[data-state="checking"] .mark,
      body[data-state="loading"] .mark {
        animation: pulse 1.1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: .52; }
        50% { opacity: 1; }
      }
      @media (prefers-color-scheme: dark) {
        body { background: #18191a; color: #e4e6eb; }
        p, #detail { color: #b0b3b8; }
        #detail { background: rgba(255, 255, 255, .08); }
      }
    </style>
  </head>
  <body data-state="checking">
    <main>
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z" />
        </svg>
      </div>
      <div role="status" aria-live="polite" aria-atomic="true">
        <h1 id="title">Checking Messenger</h1>
        <p id="message">Carrier is checking whether Facebook Messenger is reachable.</p>
      </div>
      <div class="actions">
        <button id="retry" type="button" disabled>Retry</button>
      </div>
      <pre id="detail" aria-live="polite"></pre>
    </main>

    <script>
      const invoke = (cmd, args) => window.__TAURI_INTERNALS__.invoke(cmd, args);
      const title = document.getElementById("title");
      const message = document.getElementById("message");
      const detail = document.getElementById("detail");
      const retry = document.getElementById("retry");

      function render(status) {
        document.body.dataset.state = status.state || "error";
        title.textContent = status.title || "Cannot load Messenger";
        message.textContent = status.message || "Carrier could not reach Messenger.";
        if (status.detail) {
          detail.textContent = status.detail;
          detail.style.display = "block";
        } else {
          detail.textContent = "";
          detail.style.display = "none";
        }
        retry.disabled = status.state === "checking";
      }

      async function connect() {
        render({
          state: "checking",
          title: "Checking Messenger",
          message: "Carrier is checking whether Facebook Messenger is reachable.",
        });
        try {
          render(await invoke("connect_messenger"));
        } catch (error) {
          render({
            state: "error",
            title: "Cannot check Messenger",
            message: "Carrier could not run its reachability check.",
            detail: String(error && error.message ? error.message : error),
          });
        }
      }

      retry.addEventListener("click", connect);
      connect();
    </script>
  </body>
</html>
