app-id: io.github.kristofferr.carrier
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: carrier

finish-args:
  # WebKitGTK needs shared memory and GPU access; Messenger needs the network.
  - --share=ipc
  - --share=network
  - --device=dri
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  # Carrier's automatic download/reveal flow writes user-named media beside
  # existing files and checks collisions in Downloads. A dedicated subfolder
  # or interactive save portal would change that behavior; keep this access
  # behind Carrier's existing media URL and extension allowlists.
  - --filesystem=xdg-download
  # Native notifications, KSNI tray registration, and Unity launcher badges.
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.Unity

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/carrier/cargo
    CARGO_NET_OFFLINE: "true"
    CARGO_TARGET_DIR: /run/build/carrier/target

modules:
  - name: carrier
    buildsystem: simple
    build-commands:
      - cargo --offline build --locked --release --manifest-path src-tauri/Cargo.toml
      - install -Dm755 target/release/carrier /app/bin/carrier
      - install -Dm644 packaging/flatpak/io.github.kristofferr.carrier.desktop /app/share/applications/io.github.kristofferr.carrier.desktop
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/io.github.kristofferr.carrier.png
      - install -Dm644 src-tauri/icons/64x64.png /app/share/icons/hicolor/64x64/apps/io.github.kristofferr.carrier.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.github.kristofferr.carrier.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/io.github.kristofferr.carrier.png
      - install -Dm644 src-tauri/linux/io.github.kristofferr.carrier.metainfo.xml /app/share/metainfo/io.github.kristofferr.carrier.metainfo.xml
      - sed -i 's#<launchable type="desktop-id">Carrier.desktop</launchable>#<launchable type="desktop-id">io.github.kristofferr.carrier.desktop</launchable>#' /app/share/metainfo/io.github.kristofferr.carrier.metainfo.xml
    sources:
      - type: dir
        path: ../..
        skip:
          - .cargo
          - .flatpak-builder
          - .git
          - .worktrees
          - node_modules
          - src-tauri/target
          - target
      - cargo-sources.json
