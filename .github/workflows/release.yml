name: Release

# Build installers for macOS, Windows and Linux (per-arch), sign + notarize the
# macOS artifacts, and attach everything to a curated GitHub draft release.
# Create and write that draft before pushing a tag like `v1.0.0`; this workflow
# deliberately never generates or rewrites public-facing release notes. The
# draft is published only once every build has uploaded (the `publish` job).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # A tag can land on a commit CI never checked (e.g. tagged before push, or CI
  # skipped), so gate the expensive 6-target build matrix on the same full
  # Rust and injected-script checks CI runs. Runs in parallel with
  # prepare_release; `build` needs both, so this adds no wall-clock time.
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          # Release validation should not restore or publish reusable build artifacts.
          lookup-only: true
          save-if: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install inject dependencies
        run: bun install --frozen-lockfile

      - name: Format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Check inject scripts
        run: bun run check

      - name: Generated inject bundles are fresh
        run: git diff --exit-code src-tauri/inject

  # Release notes are authored with human/agent judgment before the tag is
  # pushed, like ha-adjustable-bed. Require that curated draft and pass its body
  # to tauri-action only for latest.json; uploads target the draft by numeric id,
  # so the action cannot create or rewrite the GitHub release.
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.draft.outputs.release_id }}
      release_body: ${{ steps.draft.outputs.release_body }}
      keep_draft: ${{ steps.draft.outputs.keep_draft }}
    steps:
      - name: Validate release ref
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then
            echo "Release workflow must run on a tag; got ${GITHUB_REF}" >&2
            exit 1
          fi
          # Require a plain vX.Y.Z tag: the download-link/version rewrites below
          # only understand three-part semver, so a prerelease tag such as
          # v1.4.0-rc.1 would leave stale paths and Carrier_* filenames behind.
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be vX.Y.Z with no prerelease suffix; got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Require curated draft release
        id: draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release=$(gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            | jq -sc --arg tag "$GITHUB_REF_NAME" 'add | .[] | select(.tag_name == $tag)' \
            | head -n1)
          if [ -z "$release" ]; then
            echo "No curated draft release exists for $GITHUB_REF_NAME." >&2
            echo "Author it before tagging, for example:" >&2
            echo "  gh release create $GITHUB_REF_NAME --draft --target main --title $GITHUB_REF_NAME --notes-file release-notes.md" >&2
            exit 1
          fi

          if [ "$(jq -r '.draft' <<< "$release")" != "true" ]; then
            echo "Release $GITHUB_REF_NAME already exists but is not a draft." >&2
            exit 1
          fi

          name=$(jq -r '.name // ""' <<< "$release")
          body=$(jq -r '.body // ""' <<< "$release")
          if [ -z "${name//[[:space:]]/}" ]; then
            echo "Draft release $GITHUB_REF_NAME has no title." >&2
            exit 1
          fi
          if [ -z "${body//[[:space:]]/}" ] || ! grep -q '^## ' <<< "$body"; then
            echo "Draft release $GITHUB_REF_NAME needs curated Markdown notes with at least one ## section." >&2
            exit 1
          fi

          echo "release_id=$(jq -r '.id' <<< "$release")" >> "$GITHUB_OUTPUT"
          delimiter="RELEASE_BODY_$(date +%s%N)"
          {
            echo "release_body<<$delimiter"
            printf '%s\n' "$body"
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"
          keep_draft=false
          if grep -q '<!-- carrier:keep-draft -->' <<< "$body"; then
            keep_draft=true
            echo "Release will remain a draft after all artifacts are built."
          fi
          echo "keep_draft=$keep_draft" >> "$GITHUB_OUTPUT"
          echo "Using curated draft release: $name"

  build:
    needs: [check, prepare_release]
    strategy:
      fail-fast: false
      # Run targets one at a time: tauri-action's updater step reads the
      # release's latest.json, adds this job's signatures, then re-uploads it.
      # Concurrent jobs would clobber each other's entries.
      max-parallel: 1
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    # Predictable, versioned asset names (e.g. Carrier_1.0.0_mac_arm.dmg and
    # Carrier_1.0.0_mac_intel.dmg). The publish job rewrites the README and
    # landing-page download links to each release's version.
    env:
      ASSET_PLATFORM: ${{ contains(matrix.target, 'apple-darwin') && 'mac' || contains(matrix.target, 'windows') && 'win' || 'lin' }}
      ASSET_ARCH: ${{ contains(matrix.target, 'apple-darwin') && startsWith(matrix.target, 'x86_64') && 'intel' || startsWith(matrix.target, 'aarch64') && 'arm' || 'x64' }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils \
            build-essential

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (required for auto-update artifacts).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization of the .app (only used if set).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Upload to the exact pre-existing draft. releaseBody is used for the
          # updater changelog in latest.json; with releaseId set, tauri-action
          # cannot create or modify the GitHub release itself.
          releaseId: ${{ needs.prepare_release.outputs.release_id }}
          releaseBody: ${{ needs.prepare_release.outputs.release_body }}
          # Versioned, friendly asset names (Carrier_1.2.1_lin_x64.AppImage,
          # _win_x64_setup.exe, …); the publish job's README links and the
          # Homebrew cask both reference these exact names.
          # NB: tauri-action v1.0.0 renamed this input from `assetNamePattern`
          # to `releaseAssetNamePattern`. The old key is silently ignored (only
          # a warning), so every tauri-action bundle (AppImage, NSIS .exe, deb,
          # rpm) fell back to tauri's default names — which broke the "Update
          # Homebrew tap" step and the README's Windows/Linux download links
          # since v1.2.0. Only the DMG and portable zip stayed correct because
          # they're renamed by explicit steps below.
          releaseAssetNamePattern: "Carrier_[version]_${{ env.ASSET_PLATFORM }}_${{ env.ASSET_ARCH }}[_setup][ext]"
          # The release config enables createUpdaterArtifacts (kept out of the
          # base config so a local `tauri build` doesn't require the signing key).
          # macOS generates Tauri's stock .app.tar.gz updater archive first; the
          # notarization step below rewrites latest.json to use the stapled .dmg
          # instead, then deletes the archive so the public release stays clean.
          args: --target ${{ matrix.target }} --config src-tauri/tauri.conf.release.json

      - name: Verify macOS Downloads permission metadata
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          APP=""
          for candidate in "src-tauri/target/${{ matrix.target }}/release/bundle/macos"/*.app; do
            if [ -d "$candidate" ]; then
              APP="$candidate"
              break
            fi
          done
          if [ -z "$APP" ]; then
            echo "No macOS app bundle found for privacy metadata verification." >&2
            exit 1
          fi
          PLIST="$APP/Contents/Info.plist"
          description=$(/usr/libexec/PlistBuddy \
            -c 'Print :NSDownloadsFolderUsageDescription' "$PLIST")
          if [ -z "${description//[[:space:]]/}" ]; then
            echo "The built app has no Downloads folder usage description." >&2
            exit 1
          fi
          echo "Verified Downloads folder permission metadata in $PLIST"

      # tauri-action notarizes the .app but not the .dmg, so a downloaded .dmg
      # would still prompt. Notarize + staple it and re-upload under the same
      # stable name.
      - name: Notarize + staple the .dmg
        if: startsWith(matrix.os, 'macos')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_MAC_ARCH: ${{ startsWith(matrix.target, 'aarch64') && 'aarch64' || 'x64' }}
          TAURI_UPDATER_PLATFORM: ${{ startsWith(matrix.target, 'aarch64') && 'darwin-aarch64' || 'darwin-x86_64' }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_ID}" ] || [ -z "${APPLE_PASSWORD}" ] || [ -z "${APPLE_TEAM_ID}" ]; then
            # A tagged release promises a signed, notarized download — fail rather
            # than publish an unsigned/unstapled .dmg. Manual (workflow_dispatch)
            # runs may still skip when the secrets aren't configured.
            if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
              echo "Missing Apple notarization secrets for a tagged release." >&2
              exit 1
            fi
            echo "No Apple credentials configured — skipping .dmg notarization."
            exit 0
          fi
          SRC=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/dmg" -name '*.dmg' | head -1)
          if [ -z "${SRC}" ]; then echo "No .dmg found."; exit 0; fi
          xcrun notarytool submit "${SRC}" --apple-id "${APPLE_ID}" --password "${APPLE_PASSWORD}" --team-id "${APPLE_TEAM_ID}" --wait
          xcrun stapler staple "${SRC}"
          DEST="Carrier_${GITHUB_REF_NAME#v}_${ASSET_PLATFORM}_${ASSET_ARCH}.dmg"
          cp "${SRC}" "${DEST}"
          bun run tauri signer sign "${DEST}"
          DMG_SIGNATURE=$(cat "${DEST}.sig")
          # Use the built-in $GITHUB_REF_NAME env var, not a GitHub Actions
          # template expansion: a crafted tag name could otherwise inject shell
          # code here. (Don't write a literal Actions expression in this comment:
          # it would be interpolated and an empty one fails the whole workflow.)
          gh release upload "$GITHUB_REF_NAME" "${DEST}" --clobber

          rel_id=$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate \
            | jq -r --arg tag "$GITHUB_REF_NAME" '.[] | select(.tag_name == $tag) | .id' \
            | head -n1)
          if [ -z "$rel_id" ]; then
            echo "No draft release found for $GITHUB_REF_NAME; skipping mac asset cleanup."
            exit 0
          fi

          assets=$(gh api "repos/$GITHUB_REPOSITORY/releases/$rel_id/assets" --paginate)
          dmg_asset_id=$(printf '%s\n' "$assets" \
            | jq -r --arg name "$DEST" '.[] | select(.name == $name) | .id' \
            | head -n1)
          if [ -z "$dmg_asset_id" ]; then
            echo "Uploaded .dmg asset ${DEST} was not found." >&2
            exit 1
          fi

          latest_id=$(printf '%s\n' "$assets" \
            | jq -r '.[] | select(.name == "latest.json") | .id' \
            | head -n1)
          if [ -z "$latest_id" ]; then
            echo "latest.json was not found; cannot point mac updater at the .dmg." >&2
            exit 1
          fi

          tmp_latest=$(mktemp -d)
          gh api \
            -H "Accept: application/octet-stream" \
            "repos/$GITHUB_REPOSITORY/releases/assets/$latest_id" \
            > "$tmp_latest/latest.json"
          dmg_url="https://api.github.com/repos/$GITHUB_REPOSITORY/releases/assets/$dmg_asset_id"
          jq \
            --arg platform "$TAURI_UPDATER_PLATFORM" \
            --arg url "$dmg_url" \
            --arg signature "$DMG_SIGNATURE" \
            '.platforms[$platform].url = $url
              | .platforms[$platform].signature = $signature
              | .platforms[($platform + "-app")].url = $url
              | .platforms[($platform + "-app")].signature = $signature' \
            "$tmp_latest/latest.json" > "$tmp_latest/latest.next.json"
          mv "$tmp_latest/latest.next.json" "$tmp_latest/latest.json"
          gh release upload "$GITHUB_REF_NAME" "$tmp_latest/latest.json" --clobber

          default_dmg="Carrier_${GITHUB_REF_NAME#v}_${TAURI_MAC_ARCH}.dmg"
          assets=$(gh api "repos/$GITHUB_REPOSITORY/releases/$rel_id/assets" --paginate)
          default_dmg_id=$(printf '%s\n' "$assets" \
            | jq -r --arg name "$default_dmg" '.[] | select(.name == $name) | .id' \
            | head -n1)
          if [ -n "$default_dmg_id" ]; then
            echo "Deleting unstapled default mac .dmg asset ${default_dmg}."
            gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$default_dmg_id"
          fi

          updater_src="Carrier_${GITHUB_REF_NAME#v}_${TAURI_MAC_ARCH}.app.tar.gz"
          updater_dest="Carrier_${GITHUB_REF_NAME#v}_${ASSET_PLATFORM}_${ASSET_ARCH}.app.tar.gz"
          for updater_asset in "$updater_src" "$updater_dest"; do
            updater_id=$(printf '%s\n' "$assets" \
              | jq -r --arg name "$updater_asset" '.[] | select(.name == $name) | .id' \
              | head -n1)
            if [ -n "$updater_id" ]; then
              echo "Deleting mac updater archive asset ${updater_asset}; latest.json uses the .dmg."
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$updater_id"
            fi
          done

      # A no-installer option for Windows: just the standalone .exe (WebView2 is
      # provided by the OS on Win10+/11). The app exe is the only top-level *.exe
      # in the release dir (deps/build scripts live in subfolders), so glob it
      # rather than hardcode carrier.exe vs Carrier.exe.
      - name: Create Windows portable zip
        if: contains(matrix.target, 'pc-windows')
        shell: pwsh
        run: |
          $arch = if ("${{ matrix.target }}" -match "aarch64") { "arm" } else { "x64" }
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $zipName = "Carrier_${version}_win_${arch}_portable.zip"
          $exe = Get-ChildItem -Path "src-tauri/target/${{ matrix.target }}/release" -Filter "*.exe" -File | Select-Object -First 1
          if (-not $exe) { throw "No app .exe found in release dir" }
          $staging = "portable-staging"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item $exe.FullName "$staging/Carrier.exe"
          Compress-Archive -Path "$staging/*" -DestinationPath $zipName
          "PORTABLE_ZIP=$zipName" >> $env:GITHUB_ENV

      - name: Upload Windows portable zip
        if: contains(matrix.target, 'pc-windows')
        # Bash (Git Bash on the Windows runner), not the Windows default of
        # PowerShell — the command below uses `$VAR` env-var refs, which PowerShell
        # leaves empty, so the upload ran as `gh release upload "" ""` and failed.
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Reference the tag/asset via shell env vars rather than ${{ }} expansion
        # so a crafted tag name can't break out of the quotes and run as code.
        run: gh release upload "$GITHUB_REF_NAME" "$PORTABLE_ZIP" --clobber

  # Flip the draft to public only after every build has uploaded its assets.
  publish:
    needs: [build, prepare_release]
    # A curated draft can opt into a manual-test hold with the hidden
    # `carrier:keep-draft` marker. All six signed bundles still build and upload,
    # but public links, the Homebrew tap, and the release itself stay untouched.
    if: needs.prepare_release.outputs.keep_draft != 'true'
    runs-on: ubuntu-latest
    steps:
      # The Tauri updater reads each bundle's signature from latest.json (it is
      # embedded inline there), never from the standalone *.sig files. So these
      # are pure release-page clutter — drop them before the release goes public.
      # latest.json and every bundle are kept, so auto-update is unaffected.
      - name: Remove vestigial .sig assets
        # Cosmetic cleanup — never block the release on it.
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # The release is still a draft at this point, and GET /releases/tags/{tag}
          # only returns *published* releases (404 on a draft). List all releases
          # (draft-aware) and match the tag to get the numeric release id instead.
          # Built-in env vars, not a GitHub Actions template expansion — keeps a
          # crafted tag name from injecting shell code into this run script.
          # (No literal Actions expression in this comment: it would be
          # interpolated, and an empty one fails the whole workflow.)
          rel_id=$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate \
            --jq ".[] | select(.tag_name == \"$GITHUB_REF_NAME\") | .id" | head -n1)
          if [ -z "$rel_id" ]; then
            echo "No release found for $GITHUB_REF_NAME; nothing to clean."
            exit 0
          fi
          ids=$(gh api "repos/$GITHUB_REPOSITORY/releases/$rel_id/assets" --paginate \
            --jq '.[] | select(.name | endswith(".sig")) | .id')
          for id in $ids; do
            echo "Deleting .sig asset $id"
            gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$id" || true
          done

      # Point the README and landing page at this release BEFORE publishing, so a
      # failed Contents API push leaves the release a draft and the whole job stays
      # retryable. (Publishing first and failing here would strand stale download
      # links: the rerun aborts on the "no longer a draft" guard below.) Commit the
      # updated files straight back to the default branch through the Contents API
      # (same approach the IPTVChecker release flow uses).
      - name: Point public download links at this release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          update_release_file() {
            local path="$1"
            local temp="/tmp/$(basename "$path")"
            local sha
            sha=$(gh api "repos/${REPO}/contents/${path}" --jq '.sha')
            gh api "repos/${REPO}/contents/${path}" --jq '.content' | base64 -d > "$temp"
            cp "$temp" "${temp}.orig"
            # Update tag paths, artifact filenames, and visible vX.Y.Z labels.
            # The label pattern is a full three-part semver so it can't match
            # one-component SVG path commands (e.g. the Windows logo's `v9.451`),
            # which the broader `v[0-9]+(\.[0-9]+)+` corrupted on every release.
            sed -i -E \
              -e "s#/releases/download/v[0-9]+(\\.[0-9]+)+/#/releases/download/${TAG}/#g" \
              -e "s/Carrier_[0-9]+(\\.[0-9]+)+_/Carrier_${VERSION}_/g" \
              -e "s/v[0-9]+\\.[0-9]+\\.[0-9]+/v${VERSION}/g" \
              "$temp"
            if cmp -s "$temp" "${temp}.orig"; then
              echo "${path} already current for ${TAG}."
              return
            fi
            gh api --method PUT "repos/${REPO}/contents/${path}" \
              -f message="docs: point ${path} at ${TAG} [skip ci]" \
              -f content="$(base64 -w 0 "$temp")" \
              -f sha="${sha}" \
              -f branch="main"
          }
          update_release_file README.md
          update_release_file docs/index.html

      - name: Publish curated release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.prepare_release.outputs.release_id }}
        run: |
          set -euo pipefail
          release=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID")
          if [ "$(jq -r '.tag_name' <<< "$release")" != "$GITHUB_REF_NAME" ]; then
            echo "Release id $RELEASE_ID no longer belongs to $GITHUB_REF_NAME." >&2
            exit 1
          fi
          if [ "$(jq -r '.draft' <<< "$release")" != "true" ]; then
            echo "Release $GITHUB_REF_NAME is no longer a draft." >&2
            exit 1
          fi
          name=$(jq -r '.name // ""' <<< "$release")
          if [ -z "${name//[[:space:]]/}" ]; then
            echo "Refusing to publish $GITHUB_REF_NAME with an empty title." >&2
            exit 1
          fi
          body=$(jq -r '.body // ""' <<< "$release")
          if [ -z "${body//[[:space:]]/}" ]; then
            echo "Refusing to publish $GITHUB_REF_NAME with empty release notes." >&2
            exit 1
          fi
          if ! grep -q '^## ' <<< "$body"; then
            echo "Refusing to publish $GITHUB_REF_NAME: notes lost their curated ## sections." >&2
            exit 1
          fi
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -F draft=false >/dev/null

      # Update the Homebrew cask in kristofferR/homebrew-tap so users get
      # `brew install --cask carrier` and `brew upgrade`. Skips automatically if
      # HOMEBREW_TAP_TOKEN (a PAT with write access to the tap) isn't configured.
      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not configured, skipping tap update"
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          REPO="$GITHUB_REPOSITORY"
          TAP_REPO="kristofferR/homebrew-tap"

          # Download the assets the cask references (token has access to this repo).
          mkdir -p /tmp/assets
          for asset in \
            "Carrier_${VERSION}_mac_arm.dmg" \
            "Carrier_${VERSION}_mac_intel.dmg" \
            "Carrier_${VERSION}_lin_arm.AppImage" \
            "Carrier_${VERSION}_lin_x64.AppImage"; do
            GH_TOKEN="$RELEASE_TOKEN" gh release download "$GITHUB_REF_NAME" --repo "$REPO" --pattern "$asset" --dir /tmp/assets
          done

          # Compute SHA256 hashes (fails if any asset is missing).
          SHA_MAC_ARM=$(sha256sum "/tmp/assets/Carrier_${VERSION}_mac_arm.dmg" | cut -d' ' -f1)
          SHA_MAC_INTEL=$(sha256sum "/tmp/assets/Carrier_${VERSION}_mac_intel.dmg" | cut -d' ' -f1)
          SHA_LIN_ARM=$(sha256sum "/tmp/assets/Carrier_${VERSION}_lin_arm.AppImage" | cut -d' ' -f1)
          SHA_LIN_X64=$(sha256sum "/tmp/assets/Carrier_${VERSION}_lin_x64.AppImage" | cut -d' ' -f1)

          cat > /tmp/carrier.rb << CASK_EOF
          cask "carrier" do
            version "${VERSION}"

            on_macos do
              on_arm do
                sha256 "${SHA_MAC_ARM}"

                url "https://github.com/${REPO}/releases/download/v#{version}/Carrier_#{version}_mac_arm.dmg",
                    verified: "github.com/${REPO}/"
              end

              on_intel do
                sha256 "${SHA_MAC_INTEL}"

                url "https://github.com/${REPO}/releases/download/v#{version}/Carrier_#{version}_mac_intel.dmg",
                    verified: "github.com/${REPO}/"
              end
            end

            on_linux do
              on_arm do
                sha256 "${SHA_LIN_ARM}"

                url "https://github.com/${REPO}/releases/download/v#{version}/Carrier_#{version}_lin_arm.AppImage",
                    verified: "github.com/${REPO}/"
              end

              on_intel do
                sha256 "${SHA_LIN_X64}"

                url "https://github.com/${REPO}/releases/download/v#{version}/Carrier_#{version}_lin_x64.AppImage",
                    verified: "github.com/${REPO}/"
              end

              container type: :naked
            end

            name "Carrier"
            desc "Distraction-free desktop client for Facebook Messenger"
            homepage "https://github.com/${REPO}"

            on_macos do
              app "Carrier.app"
            end

            on_linux do
              on_arm do
                binary "Carrier_#{version}_lin_arm.AppImage", target: "carrier"
              end

              on_intel do
                binary "Carrier_#{version}_lin_x64.AppImage", target: "carrier"
              end
            end
          end
          CASK_EOF

          # Strip the heredoc indentation.
          sed -i 's/^          //' /tmp/carrier.rb

          CONTENT=$(base64 -w 0 /tmp/carrier.rb)
          EXISTING_SHA=$(gh api "repos/${TAP_REPO}/contents/Casks/carrier.rb" --jq '.sha' 2>/dev/null || echo "")

          if [ -n "$EXISTING_SHA" ]; then
            gh api --method PUT "repos/${TAP_REPO}/contents/Casks/carrier.rb" \
              -f message="Update Carrier to ${VERSION}" \
              -f content="$CONTENT" \
              -f sha="$EXISTING_SHA" \
              -f branch="main"
          else
            gh api --method PUT "repos/${TAP_REPO}/contents/Casks/carrier.rb" \
              -f message="Add Carrier ${VERSION}" \
              -f content="$CONTENT" \
              -f branch="main"
          fi
