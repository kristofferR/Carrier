name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly, so new RUSTSEC advisories surface even without commits.
    - cron: "30 5 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  # The injected-script toolchain (Ref #48): Biome lint/format, tsgo
  # typecheck, bun test for the pure logic, and a freshness check that the
  # committed bundles in src-tauri/inject/ match a rebuild of inject/src/.
  inject:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck (tsgo)
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build inject bundles
        run: bun run build:inject

      - name: Generated bundles are fresh
        run: git diff --exit-code src-tauri/inject

  # Audit Cargo.lock against the RUSTSEC advisory database. Needs no build, so
  # it skips the GTK dependency install the other jobs pay for.
  audit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2.82.8
        with:
          tool: cargo-audit

      - name: Audit
        run: cargo audit --file src-tauri/Cargo.lock

  # The `rust` job above only runs on Linux, so the macOS-only objc2 code
  # (make_webview_transparent, set_macos_window_bg, recreate_themed_windows, …)
  # and any Windows-specific code are never compiled there — a break would only
  # surface at release time. Compile + lint + test the platform-specific cfg
  # blocks on macOS and Windows too. No bundling, so this stays fast.
  cross:
    name: Cross-platform check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml
