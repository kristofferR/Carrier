# Weekly dependency update PRs. Security advisories additionally trigger
# out-of-band PRs regardless of the schedule.
version: 2
updates:
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    groups:
      # Batch routine bumps into one PR; majors stay separate for review.
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    ignore:
      # Half of a matched pair: the npm MCP server must move in lockstep with
      # the Rust guest plugin pinned by git rev in src-tauri/Cargo.toml.
      # Bump both sides together manually instead.
      - dependency-name: tauri-plugin-mcp-server
