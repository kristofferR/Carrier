# Weekly dependency update PRs. Security advisories additionally trigger
# out-of-band PRs regardless of the schedule.
version: 2
updates:
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    groups:
      # Batch routine bumps into one PR; majors stay separate for review.
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
